name: Deploy migrations to staging (dry-run on PR, manual apply)
# Hummi uses GitHub Flow (CONTEXT.md decision) — there is no `develop` branch.
# This workflow:
#   - On PR open with migration changes: runs a dry-run (defense in depth
#     alongside pr-checks.yml supabase-dry-run job — duplicate gives clearer
#     error attribution).
#   - On manual workflow_dispatch: lets the founder either dry-run again
#     (apply=false) or apply the migration to staging for real (apply=true).
#
# Production deploys live in deploy-prod.yml and trigger automatically on
# push to main — staging deploys never auto-fire.

on:
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:
    inputs:
      apply:
        description: 'Apply migrations to staging (true) or just dry-run (false)?'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  deploy-staging:
    name: Deploy to hummi-staging
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.84.5

      - name: Link to staging project
        run: supabase link --project-ref ${{ secrets.STAGING_PROJECT_ID }}

      - name: Dry-run on PR
        if: github.event_name == 'pull_request'
        run: supabase db push --linked --dry-run

      - name: Apply on manual dispatch (apply=true)
        if: github.event_name == 'workflow_dispatch' && inputs.apply == true
        run: supabase db push --linked

      - name: Dry-run on manual dispatch (apply=false)
        if: github.event_name == 'workflow_dispatch' && inputs.apply == false
        run: supabase db push --linked --dry-run
